<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Aurelius Roast</title>
    <link rel="icon" href="assets/coffee.png" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
    
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="script.js"></script>
</head>

<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Aurelius Roast</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="index.html#about">Our Story</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html" class="active">Login</a></li>
                    <li><a href="cart.html" class="cart-link"><i class="fa-solid fa-cart-shopping"></i> <span class="cart-badge">0</span></a></li>
                </ul>
            </nav>
            <button class="mobile-nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main class="login-page" style="padding-top: 120px;">
        <div class="login-card">
            <h2>Welcome Back</h2>
            <p>Enter your details to access your account.</p>
            
            <form class="login-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="name@example.com" required />
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required />
                </div>
                <button type="submit" class="btn btn-primary full-width">Sign In</button>
            </form>
            
            <div class="login-footer">
                <p>Don't have an account? <a href="signup.html">Join the club</a></p>
                <p style="margin-top: 15px;"><a href="index.html"><i class="fas fa-arrow-left"></i> Back to Home</a></p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const loginForm = document.querySelector('.login-form');
        if (loginForm) {
            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                try {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    
                    // Update lastLogin in Firestore database
                    try {
                        await updateDoc(doc(db, "users", userCredential.user.uid), {
                            lastLogin: new Date()
                        });
                    } catch (dbError) {
                        console.warn("Could not update lastLogin in Firestore database:", dbError.message);
                    }

                    alert("Login successful!");
                    window.location.href = "index.html";
                } catch (error) {
                    console.error("Login Error:", error.message);
                    alert("Error: " + error.message);
                }
            });
        }
    </script>
</body>

</html>
