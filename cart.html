<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Aurelius Roast</title>
    <link rel="icon" href="assets/coffee.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">

    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="style.css">
    <!-- p5.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
</head>

<body>
    <header class="main-header">
        <div class="container">
            <a href="index.html" class="logo">Aurelius Roast</a>
            <nav class="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="menu.html">Menu</a></li>
                    <li><a href="index.html#about">Our Story</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="cart.html" class="cart-link active"><i class="fa-solid fa-cart-shopping"></i> <span class="cart-badge">0</span></a></li>
                </ul>
            </nav>
            <button class="mobile-nav-toggle" aria-label="Toggle navigation">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <main style="padding-top: 150px; min-height: 85vh; background-color: var(--bg-primary);">
        <div class="container" style="max-width: 900px;">
            <h2 style="text-align: center; margin-bottom: 40px; font-family: 'Playfair Display', serif; font-size: 2.8rem;">Your Shopping Cart</h2>
            
            <div class="cart-wrapper" style="background: var(--white); padding: 40px; border-radius: 30px; box-shadow: var(--shadow-md); border: 1px solid rgba(111, 78, 55, 0.05);">
                
                <!-- Cart Items Container -->
                <div id="cartContent">
                    <!-- Rendered dynamically by script.js -->
                </div>
                
                <!-- Cart Totals and Summary -->
                <div id="cartTotalContainer" style="border-top: 2px solid rgba(111, 78, 55, 0.1); padding-top: 30px; display: none; margin-top: 20px;">
                    <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; color: var(--text-muted);">
                        <span>Subtotal</span>
                        <span id="cartSubtotal" style="font-weight: 600; color: var(--text-main);">₹0</span>
                    </div>
                    <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 12px; font-size: 15px; color: var(--text-muted);">
                        <span>Delivery Fee</span>
                        <span id="cartDelivery" style="font-weight: 600; color: var(--text-main);">₹0</span>
                    </div>
                    <div class="summary-row" style="display: flex; justify-content: space-between; margin-bottom: 25px; font-size: 1.3rem; font-weight: 700; color: var(--text-main); border-top: 1px dashed rgba(111, 78, 55, 0.1); padding-top: 15px;">
                        <span>Total</span>
                        <span id="cartTotal">₹0</span>
                    </div>
                    <div style="display: flex; gap: 20px; justify-content: flex-end; flex-wrap: wrap;">
                        <a href="menu.html" class="btn btn-secondary" style="border-radius: 30px; padding: 12px 24px; text-decoration: none; font-size: 14px;">Continue Shopping</a>
                        <button class="btn btn-primary" id="checkoutBtn" style="border-radius: 30px; padding: 12px 24px; font-size: 14px;">Proceed to Checkout</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="main-footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Aurelius Roast. Crafted with passion.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Listen for authentication state to save order under the logged in user
        let currentUser = null;
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
        });

        const checkoutBtn = document.getElementById('checkoutBtn');
        if (checkoutBtn) {
            checkoutBtn.addEventListener('click', async () => {
                let cart = JSON.parse(localStorage.getItem('aurelius_cart')) || [];
                if (cart.length === 0) {
                    alert("Your cart is empty!");
                    return;
                }

                if (!currentUser) {
                    alert("Please login to place your order.");
                    window.location.href = "login.html";
                    return;
                }

                // Calculate total values
                const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                const delivery = subtotal > 500 ? 0 : 50;
                const total = subtotal + delivery;

                try {
                    checkoutBtn.disabled = true;
                    checkoutBtn.textContent = "Placing Order...";

                    // Add order document to Firestore database
                    const orderRef = await addDoc(collection(db, "orders"), {
                        userId: currentUser.uid,
                        userEmail: currentUser.email,
                        items: cart,
                        subtotal: subtotal,
                        deliveryFee: delivery,
                        totalAmount: total,
                        status: "pending",
                        createdAt: new Date()
                    });

                    alert(`Order placed successfully! Order ID: ${orderRef.id}`);
                    
                    // Clear the cart
                    localStorage.setItem('aurelius_cart', JSON.stringify([]));
                    
                    // Refresh view
                    window.location.reload();
                } catch (error) {
                    console.error("Checkout Error:", error);
                    alert("Failed to place order: " + error.message);
                } finally {
                    checkoutBtn.disabled = false;
                    checkoutBtn.textContent = "Proceed to Checkout";
                }
            });
        }
    </script>
</body>
</html>
